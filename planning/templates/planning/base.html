<!DOCTYPE html>
<!--
  templates/planning/base.html - The base template that all other pages extend.

  HOW DJANGO TEMPLATES WORK:
    Django templates are HTML files with special syntax:
      Double curly braces output a variable's value.
      Curly-percent tags contain template logic (if, for, block, etc.)
      Curly-hash tags are comments not sent to the browser.

  TEMPLATE INHERITANCE:
    Django templates support inheritance via the 'extends' and 'block' tags.
    This base.html defines the overall page structure (nav, header, footer)
    and leaves "slots" (block tags) for child templates to fill in.

    Child templates start with 'extends planning/base.html' and then
    override blocks. This means you define HTML boilerplate ONCE here,
    and every page automatically gets the nav bar, styles, etc.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
      The 'block title' tag below allows child templates to set the page title.
      The text between the opening and closing block tags is the default
      if the child template doesn't override it.
    -->
    <title>{% block title %}eScience Lab Workforce Planner{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f6fa;
            color: #333;
            line-height: 1.6;
        }
        nav {
            background: #1a237e;
            color: white;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            height: 56px;
        }
        nav .brand { font-size: 1.1rem; font-weight: 700; color: white; text-decoration: none; }
        nav a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.95rem; padding: 0.3rem 0.6rem; border-radius: 4px; }
        nav a:hover { background: rgba(255,255,255,0.15); color: white; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; color: #1a237e; }
        h2 { font-size: 1.3rem; margin: 1.5rem 0 1rem; color: #283593; }
        .card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #e8eaf6; text-align: left; padding: 0.6rem 0.8rem; font-weight: 600; color: #283593; }
        td { padding: 0.55rem 0.8rem; border-bottom: 1px solid #eee; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafbff; }
        a { color: #3949ab; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 12px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .badge-active { background: #e8f5e9; color: #2e7d32; }
        .badge-ended  { background: #fce4ec; color: #c62828; }
        .badge-future { background: #fff3e0; color: #e65100; }
        .badge-ps     { background: #e3f2fd; color: #0d47a1; }
        .badge-academic { background: #f3e5f5; color: #6a1b9a; }
        .badge-research { background: #e8f5e9; color: #1b5e20; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: white; border-radius: 8px; padding: 1.2rem 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-align: center; }
        .stat-card .number { font-size: 2.5rem; font-weight: 700; color: #1a237e; }
        .stat-card .label { color: #666; font-size: 0.85rem; margin-top: 0.3rem; }
        .filters { display: flex; gap: 0.5rem; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
        .filters a, .filters button { padding: 0.35rem 0.8rem; border-radius: 20px; border: 1px solid #c5cae9; background: white; color: #3949ab; font-size: 0.85rem; cursor: pointer; text-decoration: none; }
        .filters a.active, .filters a:hover { background: #3949ab; color: white; border-color: #3949ab; }
        .tag { display: inline-block; background: #e8eaf6; color: #3949ab; border-radius: 4px; padding: 0.1rem 0.4rem; font-size: 0.8rem; margin: 0.1rem; }
        .alert { padding: 1rem 1.2rem; border-radius: 6px; margin-bottom: 1rem; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #43a047; }
        .alert-error   { background: #fce4ec; color: #c62828; border-left: 4px solid #e53935; }
        .btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            background: #3949ab;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            text-decoration: none;
        }
        .btn:hover { background: #1a237e; color: white; text-decoration: none; }
        .text-muted { color: #888; font-size: 0.85rem; }
        .fte-bar { display: inline-block; height: 8px; background: #3949ab; border-radius: 4px; vertical-align: middle; margin-right: 4px; }
    </style>
</head>
<body>

<nav>
    <a class="brand" href="{% url 'planning:dashboard' %}">🔬 eScience Lab Planner</a>
    <a href="{% url 'planning:project_list' %}">Projects</a>
    <a href="{% url 'planning:staff_list' %}">Staff</a>
    <a href="{% url 'planning:allocation_list' %}">Allocations</a>
    <a href="{% url 'planning:swap_list' %}">Budget Swaps</a>
    <a href="/admin/" style="margin-left: auto;">⚙ Admin</a>
    <a href="{% url 'planning:import_data' %}">📥 Import</a>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
